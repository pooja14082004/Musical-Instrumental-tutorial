<!DOCTYPE html>
<html>

<body>

    <script>
        const token = localStorage.getItem("token");
        if (!token) {
            window.location.href = "login.html";
        }
    </script>

    <h2>Welcome Student 🎵</h2>

    <p>This page is protected.</p>

    <button onclick="logout()">Logout</button>

    <script>
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
