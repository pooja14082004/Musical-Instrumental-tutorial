<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Sign Up</title>
    <style>
        body {
            font-family: Arial;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 420px;
            border: 2px solid #E3B23C;
            border-radius: 10px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #E3B23C;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #E3B23C;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Student Registration</h2>

        <input type="text" placeholder="Student ID" />
        <input type="text" placeholder="Full Name" />
        <input type="email" placeholder="Email ID" />
        <input type="password" placeholder="Password" />
        <input type="password" placeholder="Confirm Password" />

        <button>Register</button>
    </div>

</body>

</html>
