<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login | Music Academy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 380px;
            border: 2px solid #E3B23C;
            border-radius: 10px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #E3B23C;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #E3B23C;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            color: #E3B23C;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Student / Tutor Login</h2>

        <input type="email" placeholder="Email ID" />
        <input type="password" placeholder="Password" />

        <button>Login</button>

        <div class="footer-text">
            Don’t have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

</body>

</html>
